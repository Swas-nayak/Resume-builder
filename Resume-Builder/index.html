<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Left Side Form -->
        <div class="form-section">
            <h2>Resume Builder</h2>

            <label>Full Name</label>
            <input type="text" id="nameInput">

            <label>Email</label>
            <input type="email" id="emailInput">

            <label>Phone</label>
            <input type="text" id="phoneInput">

            <label>Professional Title</label>
            <input type="text" id="titleInput">

            <label>Skills</label>
            <textarea id="skillsInput"></textarea>
            <label>College</label>
<input type="text" id="collegeInput">

<label>Degree</label>
<input type="text" id="degreeInput">

<label>Graduation Year</label>
<input type="text" id="yearInput">
<label>Project Name</label>
<input type="text" id="projectNameInput">

<label>Project Description</label>
<textarea id="projectDescInput"></textarea>
        </div>

        <!-- Right Side Preview -->
        <div class="preview-section">

            <h1 id="previewName">Your Name</h1>

            <h3 id="previewTitle">
                Professional Title
            </h3>

            <p id="previewEmail">
                yourmail@gmail.com
            </p>

            <p id="previewPhone">
                9876543210
            </p>

            <hr>
            <hr>

<h2>Projects</h2>

<h3 id="previewProjectName">
Hotel Management System
</h3>

<p id="previewProjectDesc">
CRUD application using MongoDB and JavaScript
</p><hr>

            <h2>Skills</h2>

            <p id="previewSkills">
                HTML, CSS, JavaScript
            </p>
            <hr>

<h2>Education</h2>

<p id="previewCollege">College Name</p>
<p id="previewDegree">Degree</p>
<p id="previewYear">2027</p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
